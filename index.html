<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Admission Presentation — Md Estihad Faysal</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050505;
  --stage: #111110;
  --rail: #070707;
  --panel: #1b1a17;
  --panel-strong: #201f1b;
  --text: #f7f4ec;
  --text-dim: #c9bea7;
  --muted: #827b6c;
  --accent: #ffc400;
  --accent2: #ff7a3d;
  --accent3: #2dd4bf;
  --gold: #ffc400;
  --border: #302d25;
  --card-bg: #181713;
  --tag-bg: #242118;
  --rail-w: 216px;
}

html,
body {
  height: 100%;
  overflow: hidden;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: var(--rail-w) minmax(0, 1fr);
  background: var(--bg);
}

.thumb-rail {
  position: relative;
  z-index: 120;
  height: 100vh;
  overflow-y: auto;
  padding: 10px 10px 28px 0;
  background: var(--rail);
  border-right: 1px solid #211f1b;
}

.thumb-item {
  width: 100%;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 0;
  align-items: start;
  padding: 0 10px 10px 0;
  border: 0;
  background: transparent;
  color: inherit;
  text-align: left;
  cursor: pointer;
}

.thumb-index {
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 1;
  padding-top: 12px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.thumb-preview {
  display: flex;
  min-height: 88px;
  aspect-ratio: 16 / 9;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  padding: 9px;
  border: 2px solid transparent;
  border-radius: 6px;
  background: #12110f;
  box-shadow: inset 0 0 0 1px #24221d;
  transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}

.thumb-item:hover .thumb-preview {
  border-color: #5f5745;
  background: #171612;
}

.thumb-item.active .thumb-index {
  color: var(--text);
}

.thumb-item.active .thumb-preview {
  border-color: var(--accent2);
  background: #181510;
}

.thumb-kicker {
  color: var(--accent);
  font-size: 0.45rem;
  font-weight: 800;
  text-transform: uppercase;
  line-height: 1;
}

.thumb-title {
  display: -webkit-box;
  margin-top: 6px;
  overflow: hidden;
  color: var(--text);
  font-size: 0.62rem;
  font-weight: 900;
  line-height: 1.05;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.thumb-lines {
  display: grid;
  gap: 3px;
  margin-top: 7px;
}

.thumb-line {
  display: block;
  height: 3px;
  border-radius: 10px;
  background: #3b362c;
}

.thumb-line:nth-child(1) { width: 88%; }
.thumb-line:nth-child(2) { width: 74%; }
.thumb-line:nth-child(3) { width: 55%; }

.stage {
  position: relative;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
  background: var(--stage);
}

.stage::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, #050505 0, transparent 46px),
    linear-gradient(0deg, #050505 0, transparent 54px);
  z-index: 2;
}

.slides-container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 58px 92px 58px;
  opacity: 0;
  transform: translateX(34px);
  transition: opacity 0.34s ease, transform 0.34s ease;
  pointer-events: none;
}

.slide.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.slide.exit-left {
  opacity: 0;
  transform: translateX(-34px);
}

.slide.exit-right {
  opacity: 0;
  transform: translateX(34px);
}

.slide::after {
  content: attr(data-page);
  position: absolute;
  top: 20px;
  right: 28px;
  color: #555044;
  font-size: 0.78rem;
  font-weight: 700;
}

.slide-inner {
  width: 100%;
  max-width: 1240px;
  max-height: 100%;
  overflow-y: auto;
  scrollbar-gutter: stable;
}

/* Slide types */
.slide-title {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: left;
}

.slide-title h1 {
  max-width: 1120px;
  margin: 18px 0 28px;
  color: var(--text);
  font-size: 6.4rem;
  font-weight: 950;
  line-height: 0.93;
}

.slide-title h1 .accent-word {
  color: var(--accent);
}

.slide-title .subtitle {
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--text-dim);
  font-size: 1.28rem;
  font-weight: 800;
}

.slide-title .subtitle::before {
  content: "";
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--accent);
}

.slide-title .name {
  margin-top: 60px;
  color: var(--text-dim);
  font-size: 1rem;
  font-family: ui-monospace, "Cascadia Mono", "SFMono-Regular", Menlo, Consolas, monospace;
}

.slide-title .meta {
  max-width: 980px;
  margin-top: 8px;
  color: var(--text-dim);
  font-size: 1.1rem;
  line-height: 1.4;
}

.slide-section h2 {
  margin-bottom: 8px;
  color: var(--accent);
  font-size: 2.18rem;
  font-weight: 900;
  line-height: 1.05;
}

.slide-section .slide-divider {
  width: 68px;
  height: 4px;
  margin: 0 0 24px;
  border-radius: 999px;
  background: var(--accent);
}

/* Agenda */
.agenda-list {
  display: grid;
  gap: 10px;
  list-style: none;
}

.agenda-list li {
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 54px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg) !important;
  color: var(--text);
  font-size: 1rem;
  line-height: 1.35;
}

.agenda-num {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: var(--accent);
  color: #070707;
  font-weight: 900;
}

/* Profile */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.info-card,
.card,
.rq-card,
.reason-item,
.timeline-item,
.stat-pill,
.contrib-list li {
  background: var(--card-bg) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
}

.info-card {
  padding: 20px 22px;
}

.info-card h4 {
  margin-bottom: 14px;
  color: var(--accent);
  font-size: 0.86rem;
  font-weight: 900;
  text-transform: uppercase;
}

.info-item {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 7px 0;
  border-bottom: 1px solid #29261f;
  color: var(--text);
  font-size: 0.95rem;
}

.info-item:last-child {
  border-bottom: 0;
}

.info-item span:first-child {
  color: var(--muted);
}

.lang-table {
  width: 100%;
  margin-top: 8px;
  border-collapse: collapse;
  font-size: 0.88rem;
}

.lang-table th,
.pub-table th {
  padding: 9px 8px;
  border-bottom: 2px solid var(--border);
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 900;
  text-align: left;
  text-transform: uppercase;
}

.lang-table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 30px;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 13px;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
}

.timeline-item {
  position: relative;
  margin-bottom: 9px;
  padding: 11px 15px;
}

.timeline-item::before {
  content: "";
  position: absolute;
  left: -28px;
  top: 20px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 5px #2a2616;
}

.timeline-item .year {
  color: var(--accent);
  font-size: 0.86rem;
  font-weight: 900;
}

.timeline-item .desc {
  margin-top: 3px;
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 700;
}

.timeline-item .detail {
  margin-top: 2px;
  color: var(--text-dim);
  font-size: 0.78rem;
}

/* Cards */
.card {
  margin-bottom: 12px;
  padding: 18px 20px;
}

.card h3 {
  margin-bottom: 11px;
  color: var(--accent);
  font-size: 1.05rem;
  font-weight: 900;
  line-height: 1.3;
}

.card p,
.card li {
  color: var(--text-dim);
  font-size: 0.94rem;
  line-height: 1.55;
}

.card ul {
  list-style: none;
}

.card ul li::before {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  margin: 0 10px 2px 0;
  border-radius: 50%;
  background: var(--accent);
}

/* Skills matrix */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.skill-tag {
  display: inline-block;
  margin: 3px;
  padding: 5px 9px;
  border: 1px solid #3f3825;
  border-radius: 4px;
  background: var(--tag-bg);
  color: var(--text-dim);
  font-size: 0.78rem;
}

/* Publication table */
.pub-table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
  font-size: 0.84rem;
}

.pub-table td {
  padding: 11px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  vertical-align: top;
}

.pub-table tr:hover td {
  background: #201d15;
}

/* Architecture diagram proxy */
.arch-block {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
}

.arch-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.arch-box {
  min-width: 140px;
  padding: 10px 14px;
  border: 1px solid var(--border) !important;
  border-radius: 6px;
  background: var(--card-bg) !important;
  color: var(--text);
  font-size: 0.83rem;
  font-weight: 800;
  line-height: 1.25;
  text-align: center;
}

.arch-box.blue { color: var(--text); }
.arch-box.purple { color: var(--accent); }
.arch-box.pink { color: var(--accent3); }
.arch-box.gold { color: var(--accent); }

.arch-arrow {
  color: var(--muted);
  font-size: 1.35rem;
  text-align: center;
}

.arch-layer {
  width: 100%;
  max-width: 740px;
  padding: 10px 14px;
  border: 1px dashed #665c3e !important;
  border-radius: 6px;
  color: var(--text-dim) !important;
  background: #151410;
  font-size: 0.84rem;
  text-align: center;
}

/* Evidence screenshots */
.evidence-grid {
  display: grid;
  grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1.1fr);
  gap: 18px;
  align-items: stretch;
}

.evidence-card {
  min-height: 0;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
}

.shot-link {
  position: relative;
  display: block;
  height: 100%;
  min-height: 330px;
  overflow: hidden;
  color: inherit;
  text-decoration: none;
}

.browser-shot {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: top center;
  filter: saturate(0.92) contrast(1.04);
}

.shot-link::after {
  content: "Open in new tab";
  position: absolute;
  right: 12px;
  bottom: 12px;
  padding: 7px 10px;
  border: 1px solid #574d31;
  border-radius: 4px;
  background: rgba(7, 7, 7, 0.82);
  color: var(--accent);
  font-size: 0.74rem;
  font-weight: 900;
  text-transform: uppercase;
}

.work-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 9px;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
}

.work-card h3 {
  color: var(--accent);
  font-size: 1rem;
  font-weight: 900;
}

.work-card p,
.work-card li {
  color: var(--text-dim);
  font-size: 0.84rem;
  line-height: 1.42;
}

.work-card ul {
  display: grid;
  gap: 6px;
  list-style: none;
}

.work-card li::before {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  margin: 0 9px 2px 0;
  border-radius: 50%;
  background: var(--accent);
}

.paper-link {
  align-self: flex-start;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  padding: 8px 11px;
  border: 1px solid #574d31;
  border-radius: 4px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 900;
  text-decoration: none;
  text-transform: uppercase;
}

.research-evidence-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(360px, 1.1fr);
  gap: 18px;
  align-items: stretch;
}

.research-evidence-grid .stat-row {
  justify-content: flex-start;
}

.research-evidence-grid .stat-pill {
  min-width: 110px;
  padding: 12px 14px;
}

.research-evidence-grid .stat-pill .num {
  font-size: 2rem;
}

.research-evidence-grid .stat-pill .label {
  font-size: 0.76rem;
}

.research-evidence-grid .pub-table {
  margin-top: 14px;
}

.research-shot {
  min-height: 430px;
}

.awards-culture-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
  gap: 18px;
  align-items: stretch;
}

.culture-photo-card {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
}

.culture-photo {
  width: 100%;
  height: 310px;
  display: block;
  object-fit: cover;
  object-position: center;
  filter: saturate(0.98) contrast(1.04);
}

.culture-caption {
  padding: 15px 17px 17px;
  border-top: 1px solid var(--border);
}

.culture-caption strong {
  display: block;
  color: var(--accent);
  font-size: 1rem;
  font-weight: 900;
  line-height: 1.25;
}

.culture-caption span {
  display: block;
  margin-top: 6px;
  color: var(--text-dim);
  font-size: 0.84rem;
  line-height: 1.4;
}

.awards-stack {
  display: grid;
  gap: 12px;
}

.awards-stack .card {
  margin-bottom: 0;
}

/* Stat pills */
.stat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.stat-pill {
  min-width: 170px;
  padding: 17px 24px;
  text-align: center;
}

.stat-pill .num {
  color: var(--accent);
  background: none;
  font-size: 2.35rem;
  font-weight: 950;
  line-height: 1;
  -webkit-text-fill-color: currentColor;
}

.stat-pill .label {
  margin-top: 6px;
  color: var(--text-dim);
  font-size: 0.82rem;
}

/* Research questions */
.rq-card {
  margin-bottom: 13px;
  padding: 19px 21px;
  border-left: 4px solid var(--accent) !important;
}

.rq-card h3 {
  margin-bottom: 8px;
  color: var(--accent);
  font-size: 0.86rem;
  font-weight: 900;
  text-transform: uppercase;
}

.rq-card p {
  color: var(--text-dim);
  font-size: 0.95rem;
  line-height: 1.55;
}

/* Contrib list */
.contrib-list {
  display: grid;
  gap: 9px;
  list-style: none;
}

.contrib-list li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 16px;
}

.contrib-num {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: var(--accent);
  color: #070707;
  font-size: 0.86rem;
  font-weight: 950;
}

.contrib-list li p {
  flex: 1;
  color: var(--text-dim);
  font-size: 0.94rem;
  line-height: 1.45;
}

.year-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.year-grid .card {
  height: 100%;
  margin-bottom: 0;
}

.year-grid .card h3 {
  font-size: 0.96rem;
}

.year-grid .card li {
  font-size: 0.82rem;
  line-height: 1.42;
}

/* Closing */
.closing-reasons {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.reason-item {
  padding: 18px;
  text-align: left;
}

.reason-item .icon {
  margin-bottom: 8px;
  color: var(--accent);
  font-size: 1.5rem;
}

.reason-item p {
  color: var(--text-dim);
  font-size: 0.9rem;
  line-height: 1.45;
}

/* Navigation */
.nav-controls {
  position: fixed;
  right: 28px;
  bottom: 21px;
  z-index: 110;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: #161511;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.18s ease;
}

.nav-btn:hover {
  border-color: var(--accent);
  background: var(--accent);
  color: #070707;
}

.nav-btn:disabled {
  opacity: 0.32;
  cursor: default;
}

.nav-btn:disabled:hover {
  border-color: var(--border);
  background: #161511;
  color: var(--text-dim);
}

.slide-counter {
  min-width: 70px;
  color: var(--muted);
  font-size: 0.84rem;
  font-family: ui-monospace, "Cascadia Mono", "SFMono-Regular", Menlo, Consolas, monospace;
  text-align: center;
  user-select: none;
}

.progress-bar {
  position: fixed;
  top: 0;
  left: var(--rail-w);
  z-index: 130;
  width: calc(100% - var(--rail-w));
  height: 3px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.28s ease;
}

.fullscreen-hint {
  position: fixed;
  top: 18px;
  right: 30px;
  z-index: 110;
  color: var(--muted);
  font-size: 0.72rem;
  opacity: 0.9;
}

.deck-footer {
  position: fixed;
  left: calc(var(--rail-w) + 92px);
  right: 142px;
  bottom: 26px;
  z-index: 110;
  display: flex;
  justify-content: space-between;
  gap: 20px;
  color: var(--muted);
  font-family: ui-monospace, "Cascadia Mono", "SFMono-Regular", Menlo, Consolas, monospace;
  font-size: 0.95rem;
  pointer-events: none;
}

.research-problem-visual {
  position: relative;
  overflow: hidden;
  min-height: 455px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
}

.research-problem-visual img {
  width: 100%;
  height: 455px;
  display: block;
  object-fit: cover;
  object-position: center;
  filter: saturate(0.96) contrast(1.05);
}

.research-problem-visual::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(5, 5, 5, 0.05), rgba(5, 5, 5, 0.66));
  pointer-events: none;
}

.visual-pill {
  position: absolute;
  z-index: 2;
  bottom: 18px;
  padding: 10px 14px;
  border: 1px solid rgba(255, 196, 0, 0.38);
  border-radius: 6px;
  background: rgba(7, 7, 7, 0.78);
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.35;
  backdrop-filter: blur(8px);
}

.visual-pill strong {
  display: block;
  color: var(--accent);
  font-size: 1rem;
  font-weight: 900;
}

.visual-pill.problem {
  left: 18px;
  max-width: 42%;
}

  function slideIndexFromHash() {
    const parsed = Number.parseInt(window.location.hash.replace('#', ''), 10);
    if (Number.isFinite(parsed)) {
      return Math.max(0, Math.min(parsed - 1, SLIDES.length - 1));
    }
    return 0;
  }

  let currentSlide = slideIndexFromHash();
  let direction = 1;
  const container = document.getElementById('slidesContainer');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counter = document.getElementById('slideCounter');
  const footerCounter = document.getElementById('footerCounter');
  const progressBar = document.getElementById('progressBar');
  const thumbRail = document.getElementById('thumbRail');

  function escapeHTML(value) {
    return String(value).replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));
  }

  function cleanText(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function getSlideMeta(slide, index) {
    const template = document.createElement('template');
    template.innerHTML = slide.html.trim();

    const titleEl = template.content.querySelector('h1, h2, h3');
    const subtitleEl = template.content.querySelector('.subtitle');
    const title = cleanText(titleEl ? titleEl.textContent : `Slide ${index + 1}`);
    const kicker = index === 0
      ? cleanText(subtitleEl ? subtitleEl.textContent : 'Opening')
      : `Slide ${index + 1}`;

    return { title, kicker };
  }

  function renderSlides() {
    container.innerHTML = '';
    thumbRail.innerHTML = '';
    SLIDES.forEach((slide, i) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.dataset.page = `${i + 1} / ${SLIDES.length}`;
      div.innerHTML = slide.html;
      container.appendChild(div);

      const meta = getSlideMeta(slide, i);
      const thumb = document.createElement('button');
      thumb.type = 'button';
      thumb.className = 'thumb-item';
      thumb.setAttribute('aria-label', `Go to slide ${i + 1}: ${meta.title}`);
      thumb.innerHTML = `
        <span class="thumb-index">${i + 1}</span>
        <span class="thumb-preview">
          <span>
            <span class="thumb-kicker">${escapeHTML(meta.kicker)}</span>
            <span class="thumb-title">${escapeHTML(meta.title)}</span>
          </span>
          <span class="thumb-lines" aria-hidden="true">
            <span class="thumb-line"></span>
            <span class="thumb-line"></span>
            <span class="thumb-line"></span>
          </span>
        </span>
      `;
      thumb.addEventListener('click', () => goToSlide(i));
      thumbRail.appendChild(thumb);
    });
  }

  function updateSlide(dir) {
    const slides = container.querySelectorAll('.slide');
    const thumbs = thumbRail.querySelectorAll('.thumb-item');

    slides.forEach((s, i) => {
      s.classList.remove('active', 'exit-left', 'exit-right');
      if (i === currentSlide) {
        s.classList.add('active');
      } else if (i < currentSlide) {
        s.classList.add('exit-left');
      } else {
        s.classList.add('exit-right');
      }
    });

    thumbs.forEach((thumb, i) => {
      const isActive = i === currentSlide;
      thumb.classList.toggle('active', isActive);
      thumb.setAttribute('aria-current', isActive ? 'true' : 'false');
    });

    const activeThumb = thumbs[currentSlide];
    if (activeThumb) {
      activeThumb.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }

    counter.textContent = `${currentSlide + 1} / ${SLIDES.length}`;
    footerCounter.textContent = `${currentSlide + 1} / ${SLIDES.length}`;
    progressBar.style.transform = `scaleX(${(currentSlide + 1) / SLIDES.length})`;

    const desiredHash = `#${currentSlide + 1}`;
    if (window.location.hash !== desiredHash) {
      history.replaceState(null, '', desiredHash);
    }

    prevBtn.disabled = currentSlide === 0;
    nextBtn.disabled = currentSlide === SLIDES.length - 1;
  }

  function goToSlide(index) {
    direction = index > currentSlide ? 1 : -1;
    currentSlide = Math.max(0, Math.min(index, SLIDES.length - 1));
    updateSlide(direction);
  }

  function nextSlide() { goToSlide(currentSlide + 1); }
  function prevSlide() { goToSlide(currentSlide - 1); }

  renderSlides();
  updateSlide(1);

  prevBtn.addEventListener('click', prevSlide);
  nextBtn.addEventListener('click', nextSlide);

  window.addEventListener('hashchange', () => {
    const target = slideIndexFromHash();
    if (target !== currentSlide) {
      goToSlide(target);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      nextSlide();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      prevSlide();
    } else if (e.key === 'Home') {
      e.preventDefault();
      goToSlide(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      goToSlide(SLIDES.length - 1);
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });

  // Touch swipe support
  let touchStartX = 0;
  container.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  container.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 60) {
      diff > 0 ? nextSlide() : prevSlide();
    }
  });

  // Mouse wheel
  let wheelTimeout;
  container.addEventListener('wheel', (e) => {
    if (wheelTimeout) return;
    wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 800);
    if (e.deltaY > 0 || e.deltaX > 0) nextSlide();
    else if (e.deltaY < 0 || e.deltaX < 0) prevSlide();
  }, { passive: true });

})();
</script>
